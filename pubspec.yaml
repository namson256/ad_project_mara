name: basic_flutter_app
description: Lecturer Management Portal — MVC with Provider + go_router.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Routing — declarative, web-friendly URLs + redirect guards.
  go_router: ^14.0.0

  # State management — ChangeNotifier-based controllers.
  provider: ^6.1.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true